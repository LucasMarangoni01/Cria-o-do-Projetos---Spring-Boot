<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Escola</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- Fragments do menu -->
<div th:replace="~{/fragments/menu.html :: menu}"></div>

<main>
    <div class="card">
        <h2>Cadastro de Curso</h2>
        <form id="form-cadastro" th:action="@{/curso/salvar}" th:object="${curso}" method="post" enctype="multipart/form-data">

            <div class="form-grid">


                <div class="form-group">
                    <label>carga_horaria</label>
                    <input type="text" id="cpf" required th:field="*{cpf}">
                </div>

                <div class="form-group">
                    <label>Foto:</label>
                    <input type="file" name="arquivoFoto" accept="image/*">
                </div>

            </div>

            <div style="margin-top: 20px;">
                <button type="submit" class="btn btn-success">Salvar</button>
                <a th:href="@{/curso/listagem}" class="btn btn-alter">Voltar para Lista</a>
            </div>
        </form>
    </div>
</main>

<!-- Fragments do footer -->
<div th:replace="~{/fragments/footer.html :: footer}"></div>
</body>
</html>
